<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartManuTech — Monitor IoT</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

  header { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 16px 32px;
           display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 20px; font-weight: 600; color: #fff; }
  header h1 span { color: #4f9cf9; }
  #status { font-size: 12px; color: #64748b; }
  #status.live { color: #22c55e; }

  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 24px 32px; }
  .card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; padding: 20px; }
  .card h2 { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .card .value { font-size: 32px; font-weight: 700; color: #fff; }
  .card .value.warn { color: #f59e0b; }
  .card .value.crit { color: #ef4444; }
  .card .sub { font-size: 12px; color: #64748b; margin-top: 4px; }

  .section { padding: 0 32px 24px; }
  .section h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #94a3b8; }

  .machines { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .machine-card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; padding: 16px; }
  .machine-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #fff; }
  .sensor-row { display: flex; justify-content: space-between; align-items: center;
                padding: 6px 0; border-bottom: 1px solid #1e2235; font-size: 13px; }
  .sensor-row:last-child { border-bottom: none; }
  .sensor-name { color: #94a3b8; }
  .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge.NORMAL      { background: #14532d; color: #4ade80; }
  .badge.ADVERTENCIA { background: #451a03; color: #fbbf24; }
  .badge.CRITICO     { background: #450a0a; color: #f87171; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: left; padding: 8px 12px; color: #64748b; font-weight: 500;
             border-bottom: 1px solid #2d3148; font-size: 11px; text-transform: uppercase; }
  tbody tr { border-bottom: 1px solid #1e2235; }
  tbody tr:hover { background: #1e2235; }
  tbody td { padding: 8px 12px; }
  .ts { color: #475569; font-size: 12px; }

  #alerts-box { max-height: 280px; overflow-y: auto; }
</style>
</head>
<body>

<header>
  <h1><span>SmartManuTech</span> — Monitor IoT en tiempo real</h1>
  <span id="status">⬤ Conectando...</span>
</header>

<div class="grid" id="summary-cards">
  <div class="card"><h2>Total lecturas</h2><div class="value" id="c-total">—</div><div class="sub">desde inicio</div></div>
  <div class="card"><h2>Advertencias</h2><div class="value warn" id="c-warn">—</div><div class="sub">estado ADVERTENCIA</div></div>
  <div class="card"><h2>Críticos</h2><div class="value crit" id="c-crit">—</div><div class="sub">estado CRÍTICO</div></div>
  <div class="card"><h2>Normales</h2><div class="value" id="c-norm">—</div><div class="sub">sin anomalías</div></div>
</div>

<div class="section">
  <h2>Estado actual por máquina</h2>
  <div class="machines" id="machines"></div>
</div>

<div class="section">
  <h2>Últimas anomalías detectadas</h2>
  <div id="alerts-box">
    <table>
      <thead><tr><th>Timestamp</th><th>Máquina</th><th>Sensor</th><th>Valor</th><th>Estado</th></tr></thead>
      <tbody id="alerts-body"></tbody>
    </table>
  </div>
</div>

<script>
const API = "http://localhost:8000";

const SENSOR_LABELS = {
  temperatura: "Temperatura (°C)",
  vibracion: "Vibración (mm/s)",
  velocidad_produccion: "Vel. producción (u/min)",
  consumo_energia: "Consumo energía (%)",
  errores_maquina: "Errores máquina"
};

async function fetchJSON(path) {
  const r = await fetch(API + path);
  return r.json();
}

async function updateResumen() {
  try {
    const d = await fetchJSON("/resumen");
    document.getElementById("c-total").textContent = d.total_lecturas ?? "—";
    document.getElementById("c-warn").textContent  = d.advertencias  ?? "—";
    document.getElementById("c-crit").textContent  = d.criticos       ?? "—";
    document.getElementById("c-norm").textContent  = d.normales       ?? "—";
    document.getElementById("status").textContent  = "⬤ En vivo";
    document.getElementById("status").className    = "live";
  } catch(e) {
    document.getElementById("status").textContent = "⬤ Sin conexión — inicia api.py";
    document.getElementById("status").className   = "";
  }
}

async function updateMachines() {
  try {
    const rows = await fetchJSON("/estado/maquinas");
    const byMachine = {};
    rows.forEach(r => {
      if (!byMachine[r.maquina]) byMachine[r.maquina] = [];
      byMachine[r.maquina].push(r);
    });
    const el = document.getElementById("machines");
    el.innerHTML = Object.entries(byMachine).map(([m, sensors]) => `
      <div class="machine-card">
        <h3>🏭 ${m}</h3>
        ${sensors.map(s => `
          <div class="sensor-row">
            <span class="sensor-name">${SENSOR_LABELS[s.sensor] || s.sensor}</span>
            <span>${s.valor} &nbsp;<span class="badge ${s.estado}">${s.estado}</span></span>
          </div>`).join("")}
      </div>`).join("");
  } catch(e) {}
}

async function updateAnomalias() {
  try {
    const rows = await fetchJSON("/anomalias?limite=20");
    const tbody = document.getElementById("alerts-body");
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td class="ts">${r.timestamp}</td>
        <td>${r.maquina}</td>
        <td>${SENSOR_LABELS[r.sensor] || r.sensor}</td>
        <td>${r.valor}</td>
        <td><span class="badge ${r.estado}">${r.estado}</span></td>
      </tr>`).join("");
  } catch(e) {}
}

async function refresh() {
  await Promise.all([updateResumen(), updateMachines(), updateAnomalias()]);
}

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
